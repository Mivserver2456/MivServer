name: MIV-CRAFT-STABLE
on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check System RAM
        run: |
          echo "Your Real RAM Status:"
          free -h

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip libcurl4 libssl-dev

      - name: Download and Launch Server
        run: |
          # تحميل النسخة الرسمية
          wget https://minecraft.azureedge.net/bin-linux/bedrock-server-1.20.73.01.zip
          unzip -o bedrock-server-1.20.73.01.zip -d server
          cd server
          chmod +x bedrock_server
          
          # تشغيل السيرفر
          LD_LIBRARY_PATH=. ./bedrock_server
